<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Printer Monitor</title>
  <style>
    :root {
      --bg-color: #121212;
      --text-color: #ffffff;
      --accent-color: #ff3c3c;
      --card-bg: #1f1f1f;
    }

    body.light {
      --bg-color: #f5f5f5;
      --text-color: #000000;
      --card-bg: #ffffff;
    }

    body {
      margin: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
      transition: all 0.3s ease;
    }

    header {
      text-align: center;
      margin-bottom: 1rem;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
    }

    .stream-container {
      background-color: var(--card-bg);
      border: 3px solid var(--accent-color);
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 0 20px rgba(255, 60, 60, 0.3);
      margin-bottom: 1rem;
      max-width: 95vw;
    }

    .stream-container img {
      width: 100%;
      max-height: 70vh;
      border-radius: 8px;
    }

    .controls {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      background-color: var(--accent-color);
      color: white;
      border: none;
      padding: 0.75rem 1.2rem;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #d22f2f;
    }

    .status-card {
      background-color: var(--card-bg);
      padding: 1rem;
      border-radius: 8px;
      max-width: 600px;
      text-align: center;
      margin-bottom: 1rem;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    .toggle-theme {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: none;
      color: var(--text-color);
      border: 2px solid var(--text-color);
      padding: 0.4rem 0.8rem;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 1.5rem;
      }
      button {
        font-size: 0.9rem;
        padding: 0.5rem 1rem;
      }
    }
  </style>
</head>
<body>
  <button class="toggle-theme" onclick="toggleTheme()">🌗 Toggle Theme</button>

  <header>
    <h1>🖨️ FlashForge Adventurer 3 Monitor</h1>
  </header>

  <div class="stream-container">
    <img id="stream" src="http://192.168.1.26:8080/?action=stream" alt="3D Printer Stream">
  </div>

  <div class="controls">
    <button onclick="takeSnapshot()">📸 Snapshot</button>
    <button onclick="refreshStream()">🔁 Refresh Stream</button>
  </div>

  <div class="status-card">
    <h2>🧠 Printer Status</h2>
    <p id="printer-status">Status: <em>Idle (placeholder)</em></p>
    <!-- Later this can pull real-time data if an API is exposed -->
  </div>

  <script>
    function takeSnapshot() {
      const img = document.getElementById("stream");
      const canvas = document.createElement("canvas");
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0);
      const link = document.createElement("a");
      link.download = `snapshot_${new Date().toISOString()}.jpg`;
      link.href = canvas.toDataURL("image/jpeg");
      link.click();
    }

    function refreshStream() {
      const stream = document.getElementById("stream");
      const currentSrc = stream.src;
      stream.src = "";
      setTimeout(() => {
        stream.src = currentSrc + "&" + new Date().getTime();
      }, 100);
    }

    function toggleTheme() {
      document.body.classList.toggle("light");
    }
  </script>
</body>
</html>
