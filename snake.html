  <h1>Snake Game</h1>
  <canvas id="snakeCanvas" width="400" height="400"></canvas>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const canvas = document.getElementById('snakeCanvas');
    const ctx = canvas.getContext('2d');
    const boxSize = 20;
    
    let snake = [{ x: 0, y: 0 }];
    let food = { x: 0, y: 0 };
    let direction = 'right';

    function draw() {
      // Draw the snake
      ctx.fillStyle = 'green';
      snake.forEach(segment => ctx.fillRect(segment.x, segment.y, boxSize, boxSize));

      // Draw the food
      ctx.fillStyle = 'red';
      ctx.fillRect(food.x, food.y, boxSize, boxSize);
    }

    function update() {
      // Move the snake
      const head = { x: snake[0].x, y: snake[0].y };
      switch (direction) {
        case 'up': head.y -= boxSize; break;
        case 'down': head.y += boxSize; break;
        case 'left': head.x -= boxSize; break;
        case 'right': head.x += boxSize; break;
      }
      snake.unshift(head);

      // Check for collision with food
      if (head.x === food.x && head.y === food.y) {
        generateFood();
      } else {
        snake.pop();
      }
    }

    function generateFood() {
      food.x = Math.floor(Math.random() * (canvas.width / boxSize)) * boxSize;
      food.y = Math.floor(Math.random() * (canvas.height / boxSize)) * boxSize;
    }

    function checkCollision() {
      const head = snake[0];
      // Check collision with walls
      if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) {
        resetGame();
      }
      // Check collision with self
      for (let i = 1; i < snake.length; i++) {
        if (head.x === snake[i].x && head.y === snake[i].y) {
          resetGame();
        }
      }
    }

    function resetGame() {
      alert('Game Over!');
      snake = [{ x: 0, y: 0 }];
      direction = 'right';
      generateFood();
    }

    function gameLoop() {
      setTimeout(() => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        update();
        checkCollision();
        draw();
        gameLoop();
      }, 200); // Adjust the delay (in milliseconds) for slower/faster speed
    }

    document.addEventListener('keydown', (e) => {
      switch (e.key) {
        case 'ArrowUp': direction = 'up'; break;
        case 'ArrowDown': direction = 'down'; break;
        case 'ArrowLeft': direction = 'left'; break;
        case 'ArrowRight': direction = 'right'; break;
      }
    });

    generateFood();
    gameLoop();
  });
</script>
